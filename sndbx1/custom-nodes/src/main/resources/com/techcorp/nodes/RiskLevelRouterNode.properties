nodeDescription=Risk Level Router
nodeHelp=Reads a risk score from shared state and routes to one of four outcomes: \
Low Risk, Medium Risk, High Risk, or Error. Thresholds are configurable. \
Also sets "riskLevel" and "riskScore" as session properties for downstream policy evaluation.

riskScoreKey=Risk Score Key
riskScoreKey.help=The shared state key containing the numeric risk score (0-100). \
Default: "riskScore". Set by an upstream Scripted Decision or custom node.

mediumThreshold=Medium Risk Threshold
mediumThreshold.help=Scores at or above this value are routed to "Medium Risk". Default: 30.

highThreshold=High Risk Threshold
highThreshold.help=Scores at or above this value are routed to "High Risk". Default: 70.
