nodeDescription=IP Whitelist Check
nodeHelp=Checks if the client IP address is in a configurable whitelist. \
Routes to "true" if the IP is allowed, "false" if not. \
Supports X-Forwarded-For header parsing for deployments behind a reverse proxy.

allowedIps=Allowed IP Addresses
allowedIps.help=Set of IP addresses that are permitted. \
Add one IP per entry (e.g., 10.0.0.1, 192.168.1.0). \
If the client IP matches any entry, the node routes to "true".

checkXForwardedFor=Check X-Forwarded-For Header
checkXForwardedFor.help=When enabled, reads the client IP from the X-Forwarded-For header \
instead of the direct connection IP. Enable this when AM is behind a load balancer \
or reverse proxy (PingGateway, Nginx, etc.). Disable for direct client connections.
