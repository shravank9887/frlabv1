nodeDescription=Security Question
nodeHelp=Prompts the user with a configurable security question and checks their \
answer against a value stored in shared state. Uses the callback pattern — \
process() runs twice: first to send the question, then to verify the answer.

question=Security Question
question.help=The question displayed to the user (e.g., "What is your mother's maiden name?"). \
The user sees this as a text prompt during authentication.

expectedAnswerKey=Expected Answer Key
expectedAnswerKey.help=The shared state key that holds the correct answer. \
An upstream node (e.g., Scripted Decision) must set this key before this node runs. \
Default: "securityAnswer".
