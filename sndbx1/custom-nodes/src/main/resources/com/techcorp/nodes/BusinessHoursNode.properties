nodeDescription=Business Hours Check
nodeHelp=Checks if the current time falls within configurable business hours. \
Routes to "true" if within hours, "false" if outside. \
Use to restrict login during off-hours or trigger step-up MFA.

startHour=Start Hour
startHour.help=The hour (0-23) when business hours begin. Default: 9 (9 AM).

endHour=End Hour
endHour.help=The hour (0-23) when business hours end. Default: 18 (6 PM).

timezone=Timezone
timezone.help=The timezone to evaluate business hours in.
