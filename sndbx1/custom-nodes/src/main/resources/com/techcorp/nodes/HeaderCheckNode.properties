nodeDescription=Header Check & Enrichment
nodeHelp=Reads configurable HTTP headers from the authentication request and \
stores their values in shared state for downstream nodes. \
Routes to "Missing" if any required header is absent.

headersToCapture=Headers to Capture
headersToCapture.help=Set of HTTP header names to read and store in shared state \
(e.g., X-Forwarded-For, User-Agent, X-Custom-Header). \
Values are stored with prefix "header_" (e.g., header_User-Agent).

requiredHeaders=Required Headers
requiredHeaders.help=Subset of headers that MUST be present. \
If any required header is missing, the node routes to the "Missing" outcome.
