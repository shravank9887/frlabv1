# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

services:
  pingds:
    build:
      context: ./pingds
      dockerfile: Dockerfile
    image: pingds:latest
    container_name: pingds
    hostname: pingds
    user: "0"  # Run as root to fix volume permissions, entrypoint drops to pingds user
    networks:
      fr-net:
        aliases:
          - pingds
          - ds.example.com
    ports:
      - "1389:1389"   # LDAP
      - "1636:1636"   # LDAPS
      - "4444:4444"   # Admin connector
      - "8080:8080"   # HTTP
      - "8443:8443"   # HTTPS
    environment:
      # DS Configuration
      - DS_HOSTNAME=pingds
      - DS_SERVER_ID=ds-server-01
      - DS_DEPLOYMENT_ID=forgerock-eval
      - DS_DEPLOYMENT_PASSWORD=Passw0rd123

      # Root credentials
      - DS_ROOT_PASSWORD=Passw0rd123
      - DS_MONITOR_PASSWORD=Passw0rd123

      # AM integration passwords
      - AM_CONFIG_PASSWORD=Passw0rd123
      - AM_IDENTITY_PASSWORD=Passw0rd123

      # Java options
      - OPENDJ_JAVA_ARGS=-server -Xmx1g -XX:+UseG1GC

    volumes:
      # Persistent data
      - pingds-data:/opt/pingds-data

      # Certificates (shared with other services)
      - shared-certs:/opt/certs

      # Backups
      - pingds-backups:/opt/backups

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "/opt/opendj/bin/status", "--hostname", "pingds", "--port", "4444", "--bindDN", "cn=Directory Manager", "--bindPassword", "Passw0rd123", "--trustAll"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  pingam:
    build:
      context: ./pingam
      dockerfile: Dockerfile
    image: pingam:latest
    container_name: pingam
    hostname: pingam
    networks:
      fr-net:
        aliases:
          - pingam
          - am.example.com
    ports:
      - "8081:8080"   # HTTP (mapped to 8081 to avoid conflict with PingDS)
      - "8444:8443"   # HTTPS
    environment:
      # Truststore password (matches PingDS exported truststore)
      - TRUSTSTORE_PASSWORD=changeit

      # AM server settings (for reference)
      - AM_SERVER_FQDN=pingam
      - AM_SERVER_PORT=8080
      - AM_SERVER_PROTOCOL=http
    volumes:
      # AM configuration (persistent)
      - pingam-config:/opt/am-config

      # Tomcat logs
      - pingam-logs:/usr/local/tomcat/logs

      # Shared certificates from PingDS
      - shared-certs:/opt/certs:ro

    depends_on:
      pingds:
        condition: service_healthy

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/am/isAlive.jsp"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

# Named volumes for data persistence
volumes:
  pingds-data:
    name: forgerock_pingds_data
    driver: local

  shared-certs:
    name: forgerock_shared_certs
    driver: local

  pingds-backups:
    name: forgerock_pingds_backups
    driver: local

  pingam-config:
    name: forgerock_pingam_config
    driver: local

  pingam-logs:
    name: forgerock_pingam_logs
    driver: local

# External network (already created)
networks:
  fr-net:
    external: true
    name: fr-net
