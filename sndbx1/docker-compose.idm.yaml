# PingIDM + dedicated DS repository
# Usage: docker compose -f docker-compose.idm.yaml up -d --build
# Requires: fr-net network (created by main compose), pingds running (for AM user sync later)
#
# Certificate flow:
#   1. pingds-idm starts → generates deployment key + CA cert
#   2. pingds-idm exports CA cert to shared-certs-idm volume
#   3. pingidm starts → imports CA cert into its truststore
#   4. pingidm connects to pingds-idm using startTLS (LDAP port 2389)
#   5. pingidm also imports pingds CA cert (from shared-certs volume) for LDAP connector to AM's DS

services:
  pingds-idm:
    build:
      context: ./pingds-idm
      dockerfile: Dockerfile
    image: pingds-idm:latest
    container_name: pingds-idm
    hostname: pingds-idm
    user: "0"
    networks:
      fr-net:
        aliases:
          - pingds-idm
    ports:
      - "2389:2389"   # LDAP (+ startTLS)
      - "2636:2636"   # LDAPS
      - "5444:5444"   # Admin connector
    environment:
      - DS_HOSTNAME=pingds-idm
      - DS_SERVER_ID=ds-idm-01
      # DS_DEPLOYMENT_ID is auto-generated by dskeymgr on first setup (stored in volume)
      - DS_DEPLOYMENT_PASSWORD=Passw0rd123
      - DS_ROOT_PASSWORD=Passw0rd123
      - DS_MONITOR_PASSWORD=Passw0rd123
      - OPENDJ_JAVA_ARGS=-server -Xmx512m -XX:+UseG1GC
    volumes:
      - pingds-idm-data:/opt/pingds-data
      - shared-certs-idm:/opt/certs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2389"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  pingidm:
    build:
      context: ./pingidm
      dockerfile: Dockerfile
    image: pingidm:latest
    container_name: pingidm
    hostname: pingidm
    networks:
      fr-net:
        aliases:
          - pingidm
    ports:
      - "8082:8082"   # HTTP (IDM admin + API)
    environment:
      - JAVA_OPTS=-XX:MaxRAMPercentage=65 -XX:InitialRAMPercentage=65 -Djava.security.egd=file:/dev/urandom
    volumes:
      - pingidm-logs:/opt/openidm/logs
      - pingidm-audit:/opt/openidm/audit
      # DS-IDM certificates (read-only) - IDM imports CA cert into its truststore
      - shared-certs-idm:/opt/certs:ro
      # DS (AM) certificates (read-only) - IDM LDAP connector needs pingds CA cert for startTLS
      - shared-certs-am:/opt/certs-am:ro
    depends_on:
      pingds-idm:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "-H", "X-OpenIDM-Username: anonymous", "-H", "X-OpenIDM-Password: anonymous", "http://localhost:8082/openidm/info/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  pingds-idm-data:
    name: forgerock_pingds_idm_data
    driver: local
  shared-certs-idm:
    name: forgerock_shared_certs_idm
    driver: local
  shared-certs-am:
    name: forgerock_shared_certs
    external: true
  pingidm-logs:
    name: forgerock_pingidm_logs
    driver: local
  pingidm-audit:
    name: forgerock_pingidm_audit
    driver: local

networks:
  fr-net:
    external: true
    name: fr-net
